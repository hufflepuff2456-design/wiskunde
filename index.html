<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />

<title>Maths with Atlas — Ninja Training</title>

<style>
/* -------------------------------------------------------------
   NINJA THEME + VERTICAL CHAKRA
------------------------------------------------------------- */
:root{
 --bg:#0a0a0a;
 --panel:#141414;
 --ink:#f2f2f2;
 --ink2:#b9b9b9;
 --line:#333;

 --red:#d62828;
 --red2:#8c1212;
 --redL:#ff5656;

 --chakraStart:#ff8c00; 
 --chakraEnd:#d00000;
}

*{box-sizing:border-box;}
body{
 margin:0;
 background:#000;
 color:var(--ink);
 font-family:system-ui;
}

/* TOP BAR */
.top{
 display:flex;align-items:center;gap:14px;
 padding:12px 16px;
 background:#000;border-bottom:2px solid var(--red);
 position:sticky;top:0;z-index:20;
}
.brand{color:var(--redL);font-size:20px;font-weight:700;}
.sub{color:var(--ink2);font-size:12px;font-style:italic;}
.pill{
 padding:4px 10px;border-radius:999px;
 border:1px solid var(--red2);
 background:rgba(214,40,40,.12);
 font-size:12px;color:var(--redL);
}
.spacer{flex:1}

/* GRID */
.shell{
 display:grid;
 grid-template-columns:240px 1fr 320px;
 gap:14px;
 padding:14px;
 max-width:1400px;margin:auto;
}
aside,main{
 background:var(--panel);
 border:1px solid var(--line);
 border-radius:12px;
}
aside{padding:12px;}
h2{
 color:var(--redL);
 margin:6px;
 font-size:14px;
 text-transform:uppercase;
}

/* CONTROLS */
.group{margin:10px 6px;display:flex;flex-direction:column;gap:6px;}
label{color:var(--ink2);font-size:12px;}
select,input{
 padding:8px 10px;border-radius:8px;
 background:#0f0f0f;color:#fff;
 border:1px solid var(--line);
}

.btn{
 all:unset;cursor:pointer;
 padding:9px 12px;text-align:center;
 border-radius:10px;
 font-weight:600;
 border:1px solid var(--red);
 background:#111;color:var(--redL);
}
.btn:hover{filter:brightness(1.15);}
.btn.primary{
 background:linear-gradient(#300,#700);
 color:#fff;border-color:var(--redL);
}
.btn.accent{
 background:linear-gradient(#300000,#5a0000);
 color:#fff;
}

/* WORK AREA */
.toolbar{
 display:flex;align-items:center;gap:8px;
 padding:10px 12px;background:#0e0e0e;
 border-bottom:1px solid var(--red);
}
.topic-tag{
 padding:5px 8px;border-radius:8px;
 border:1px solid var(--red);
 background:#111;color:var(--redL);
}
.worksheet{
 padding:16px;
 display:grid;grid-template-rows:auto auto 1fr;
 gap:10px;background:#111;
}
.question{font-size:clamp(18px,2.5vw,26px);}
.answer{
 display:flex;align-items:flex-end;gap:8px;
 background:#0d0d0d;padding:10px;
 border:1px solid var(--line);border-radius:10px;
}
.answer input{
 background:#111;color:#fff;
 border:1px solid var(--line);
 border-radius:8px;padding:8px 10px;
}

.feedback .ok{color:#79ff9e;font-weight:700;}
.feedback .bad{color:#ff6e6e;font-weight:700;}

.steps{
 display:none;background:#0d0d0d;
 border:1px dashed var(--red);
 padding:10px;border-radius:10px;
 color:var(--ink2);white-space:pre-wrap;
}

/* HISTORY + CHAKRA */
.list{
 display:flex;flex-direction:column;gap:8px;
 max-height:calc(100vh - 260px);
 overflow-y:auto;
 padding-right:6px;
}
.card{
 background:#0d0d0d;border:1px solid var(--line);
 border-radius:10px;padding:10px;font-size:12px;
}
.mono{font-family:monospace;}
.tiny{font-size:11px;color:var(--ink2);}

#chakraContainer{
 height:180px;
 width:48px;
 background:#222;
 border:1px solid #555;
 border-radius:12px;
 margin-top:14px;
 display:flex;align-items:flex-end;
 overflow:hidden;
}
#chakraFill{
 width:100%;
 height:0%;
 background:linear-gradient(var(--chakraStart),var(--chakraEnd));
 transition:height .25s linear, filter .2s;
}
.explode{animation:boom .4s forwards;}

@keyframes boom{
 0%{transform:scale(1);}
 30%{transform:scale(1.3);}
 60%{transform:scale(.7);}
 100%{transform:scale(1);}
}

@media(max-width:1100px){
 .shell{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<!-- TOP -->
<div class="top">
 <div class="brand">maths with atlas</div>
 <div class="sub">— ninja training</div>
 <div class="spacer"></div>
 <div class="pill"><span id="streak">0</span> streak</div>
 <div class="pill"><span id="accuracy">—</span> accuracy</div>
</div>

<!-- GRID -->
<div class="shell">

<!-- LEFT -->
<aside>
 <h2>Setup</h2>

 <div class="group">
  <label>Topic</label>
  <select id="topic">
    <option value="arithmetic">Arithmetic</option>
    <option value="fractions">Fractions</option>
    <option value="percent">Percentages</option>
    <option value="algebra_linear">Algebra – Linear</option>
    <option value="algebra_quadratic">Algebra – Quadratic</option>
    <option value="systems">Systems</option>
    <option value="functions">Functions</option>
    <option value="exponents">Exponents</option>
    <option value="logarithms">Logarithms</option>
    <option value="sequences">Sequences</option>
    <option value="probability">Probability</option>
    <option value="geometry">Geometry</option>
    <option value="matrices">Matrices</option>
    <option value="mix">Mixed</option>
  </select>
 </div>

 <div class="group">
  <label>Level</label>
  <select id="level">
   <option value="1">Beginner</option>
   <option value="2">Apprentice</option>
   <option value="3">Journeyman</option>
   <option value="4">Master (Einstein)</option>
  </select>
 </div>

 <div class="group">
  <label>Answer Mode</label>
  <select id="mode">
   <option value="auto">Auto</option>
   <option value="exact">Exact</option>
  </select>
 </div>

 <div class="group">
  <button id="generate" class="btn primary">Generate</button>
  <button id="resetStats" class="btn">Reset Stats</button>
 </div>
</aside>

<!-- MAIN -->
<main>
 <div class="toolbar">
  <div id="topicTag" class="topic-tag">—</div>
  <div id="meta" class="tiny"></div>
  <div class="spacer"></div>
  <button id="explain" class="btn">Explain</button>
  <button id="next" class="btn accent">Next</button>
 </div>

 <div class="worksheet">
   <div id="qText" class="question">Choose topic + level → Generate.</div>

   <div class="answer">
     <input id="answer" type="text" placeholder="e.g. 3/4" />
     <button id="check" class="btn">Check</button>
     <div id="feedback" class="feedback"></div>
   </div>

   <div id="steps" class="steps"></div>
 </div>
</main>

<!-- RIGHT -->
<aside>
 <h2>History</h2>

 <div id="history" class="list"></div>

 <h2>Chakra Level</h2>
 <div id="chakraContainer">
   <div id="chakraFill"></div>
 </div>
</aside>

</div>

<script>
/* ============================================================
   UTILITIES
============================================================ */
const $=s=>document.querySelector(s);
const rand=(a,b)=>a+Math.floor(Math.random()*(b-a+1));
const choice=a=>a[Math.floor(Math.random()*a.length)];
const sgn=_=>Math.random()<.5?-1:1;

function parseNumber(s){
 s=(s||"").trim();
 if(!s)return NaN;
 if(s.includes("/")){
  let[a,b]=s.split("/").map(Number);
  if(!b)return NaN;
  return a/b;
 }
 const n=Number(s);
 return isFinite(n)?n:NaN;
}

function pretty(x){
 if(!isFinite(x))return x;
 if(Math.abs(x-Math.round(x))<1e-12)return Math.round(x);
 return Number(x.toFixed(6));
}

function eq(a,b,mode){
 return mode==="exact"
   ? a===b
   : Math.abs(a-b)<=1e-4*Math.max(1,Math.abs(a),Math.abs(b));
}

/* ============================================================
   STATE
============================================================ */
let cur=null;
let streak=0,right=0,total=0;
let chakra=0;

/* ============================================================
   CHAKRA BAR
============================================================ */
function addChakra(a){
 chakra=Math.min(100,chakra+a);
 $("#chakraFill").style.height=chakra+"%";

 if(chakra===100){
  $("#chakraFill").classList.add("explode");
  setTimeout(()=>{
   chakra=0;
   $("#chakraFill").classList.remove("explode");
   $("#chakraFill").style.height="0%";
  },500);
 }
}

/* ============================================================
   RANGES
============================================================ */
function ranges(L){
 return {
  1:{s:[0,10],m:[2,20],b:[3,40]},
  2:{s:[-20,40],m:[4,80],b:[6,160]},
  3:{s:[-120,120],m:[20,300],b:[80,900]},
  4:{s:[-300,300],m:[60,600],b:[200,2000]},
 }[L];
}

/* ============================================================
   QUESTION GENERATORS
============================================================ */
function g_arith(R){
 let op=choice(["+","-","×","÷"]);
 let a=rand(...R.m)*sgn(),b=rand(...R.m)*sgn();
 if(op==="÷"){
  b=rand(2,20);
  let q=rand(-12,12);
  a=q*b;
  return{p:`${a} ÷ ${b}`,a:q};
 }
 return{p:`${a} ${op} ${b}`,a:eval(`${a}${op.replace("×","*")}${b}`)};
}

function g_frac(R){
 let a=rand(-12,12),b=rand(2,12),c=rand(-12,12),d=rand(2,12);
 let op=choice(["+","-","×","÷"]);
 let n,den;
 if(op==="×"){n=a*c;den=b*d;}
 else if(op==="÷"){n=a*d;den=b*c;}
 else{den=b*d; n=op==="+"?a*d+c*b:a*d-c*b;}
 return{p:`${a}/${b} ${op} ${c}/${d}`,a:n/den};
}

function g_percent(R){
 let base=rand(...R.b),p=rand(5,90),m=choice(["of","inc","dec"]);
 if(m==="of")return{p:`${p}% of ${base}`,a:base*p/100};
 if(m==="inc")return{p:`Increase ${base} by ${p}%`,a:base*(1+p/100)};
 return{p:`Decrease ${base} by ${p}%`,a:base*(1-p/100)};
}

function g_lin(R){
 let x0=rand(-40,40);
 let a=rand(-20,20)||1,b=rand(-20,20);
 let c=a*x0+b;
 return{p:`Solve: ${a}x + ${b} = ${c}`,a:x0};
}

function g_quad(R,L){
 if(L<4){
  let r1=rand(-12,12),r2=rand(-12,12);
  let A=choice([1,1,2,3]);
  let B=-A*(r1+r2),C=A*r1*r2;
  return{p:`Smaller root of ${A}x² ${B>=0?"+":""}${B}x ${C>=0?"+":""}${C}=0`,a:Math.min(r1,r2)};
 }
 let A=rand(-9,9)||1,B=rand(-50,50),C=rand(-200,200);
 let ask=choice(["sum","product"]);
 return{
  p:`For ${A}x² ${B>=0?"+":""}${B}x ${C>=0?"+":""}${C}, give ${ask}.`,
  a:ask==="sum"?-B/A:C/A
 };
}

function g_sys(R){
 let x0=rand(-20,20),y0=rand(-20,20);
 let a=rand(-10,10)||1,b=rand(-10,10)||1,c=rand(-10,10)||1,d=rand(-10,10)||1;
 let r1=a*x0+b*y0, r2=c*x0+d*y0;
 let ask=choice(["x","y"]);
 return{
  p:`Solve, give ${ask}:<br>${a}x+${b}y=${r1}<br>${c}x+${d}y=${r2}`,
  a:ask==="x"?x0:y0
 };
}

function g_fun(R){
 let type=choice(["eval","compose","solve","domain"]);
 let a=rand(-6,6)||2,b=rand(-10,10),c=rand(-6,6)||3;

 if(type==="eval"){
  let x=rand(-10,10);
  return{p:`f(x)=${a}x+${b}. f(${x})?`,a:a*x+b};
 }
 if(type==="compose"){
  let x0=rand(-5,5);
  return{p:`f=${a}x+${b}, g=${c}x+${a}. (f∘g)(${x0})?`,a:a*(c*x0+a)+b};
 }
 if(type==="solve"){
  let k=rand(-20,20);
  return{p:`Solve ${a}x+${b}=${k}`,a:(k-b)/a};
 }
 let h=rand(2,12);
 return{p:`Domain of 1/(x-${h})? Excluded value?`,a:h};
}

function g_exp(R){
 let t=choice(["pow","root","prod"]);
 if(t==="pow"){let a=rand(2,9),b=rand(2,6);return{p:`${a}^${b}`,a:a**b};}
 if(t==="root"){let r=rand(2,20);return{p:`√${r*r}`,a:r};}
 let a=rand(2,5),p=rand(2,5),q=rand(2,5);
 return{p:`${a}^${p} × ${a}^${q}`,a:a**(p+q)};
}

function g_log(R){
 let base=rand(2,12),k=rand(1,5),b=base**k;
 return{p:`log_${base}(${b})`,a:k};
}

function g_seq(R){
 if(Math.random()<.5){
  let a1=rand(-30,30),d=rand(-10,10)||2,n=rand(4,25);
  return{p:`Arithmetic: a1=${a1}, d=${d}. a${n}?`,a:a1+(n-1)*d};
 }
 let a1=rand(-10,10)||2,r=rand(2,6),n=rand(4,15);
 return{p:`Geometric: a1=${a1}, r=${r}. a${n}?`,a:a1*(r**(n-1))};
}

function g_prob(R){
 let n=rand(4,12),r=rand(0,n);
 function C(n,r){let t=1;for(let i=1;i<=r;i++)t=t*(n-r+i)/i;return t;}
 return{p:`C(${n},${r})`,a:C(n,r)};
}

function g_geo(R){
 let t=choice(["rect","tri","circ"]);
 if(t==="rect"){let a=rand(2,40),b=rand(2,40);return{p:`Area rectangle ${a}×${b}`,a:a*b};}
 if(t==="tri"){let a=rand(2,40),h=rand(2,40);return{p:`Triangle base ${a}, height ${h}`,a:.5*a*h};}
 let r=rand(2,20);return{p:`Area circle r=${r}`,a:3.1416*r*r};
}

function g_mat(R){
 let a=rand(-9,9),b=rand(-9,9),c=rand(-9,9),d=rand(-9,9);
 return{p:`det[[${a},${b}],[${c},${d}]]`,a:a*d-b*c};
}

/* MAPPING */
const GEN={
 arithmetic:g_arith,
 fractions:g_frac,
 percent:g_percent,
 algebra_linear:g_lin,
 algebra_quadratic:g_quad,
 systems:g_sys,
 functions:g_fun,
 exponents:g_exp,
 logarithms:g_log,
 sequences:g_seq,
 probability:g_prob,
 geometry:g_geo,
 matrices:g_mat
};

/* ============================================================
   LOAD NEW QUESTION  ✅ FIXED!!!
============================================================ */
function newQ(){
 let topic=$("#topic").value;
 let level=+$("#level").value;
 let R=ranges(level);

 let q = (topic==="mix")
   ? GEN[choice(Object.keys(GEN))](R,level)   // ✅ FIXED MIX LOGIC
   : GEN[topic](R,level);

 cur={tag:topic,p:q.p,a:q.a};

 $("#qText").innerHTML=q.p;
 $("#topicTag").textContent=topic;
 $("#meta").textContent=$("#level").selectedOptions[0].text;

 $("#answer").value="";
 $("#feedback").textContent="";
 $("#steps").style.display="none";
 $("#answer").focus();
}

/* ============================================================
   CHECK
============================================================ */
function check(){
 if(!cur)return;

 const u=parseNumber($("#answer").value);
 const ok=eq(u,cur.a,$("#mode").value);

 total++;
 if(ok){
  streak++; right++;
  $("#feedback").innerHTML=`<span class='ok'>Correct!</span>`;
  addChakra(12);
 }else{
  streak=0;
  $("#feedback").innerHTML=`<span class='bad'>Answer: ${pretty(cur.a)}</span>`;
  addChakra(6);
 }

 updateStats();
 addHistory(cur.p,u,cur.a,ok);
}

/* ============================================================
   HISTORY
============================================================ */
function addHistory(p,u,t,ok){
 let div=document.createElement("div");
 div.className="card";
 div.innerHTML=
 `<div class='tiny'>${new Date().toLocaleTimeString()}</div>
  <div>${p}</div>
  <div class='tiny'>
    <b>Yours:</b> <span class='mono'>${isNaN(u)?"—":pretty(u)}</span>
    • <b>Key:</b> <span class='mono'>${pretty(t)}</span>
    • ${ok?"✅":"❌"}
  </div>`;

 $("#history").prepend(div);
 $("#history").scrollTop=0;
}

/* ============================================================
   RESET
============================================================ */
$("#resetStats").onclick=()=>{
 streak=right=total=chakra=0;
 $("#chakraFill").style.height="0%";
 $("#history").innerHTML="";        // ✅ FIXED: clears history
 updateStats();
};

/* ============================================================
   BUTTONS
============================================================ */
$("#generate").onclick=newQ;
$("#next").onclick=newQ;
$("#check").onclick=check;
$("#explain").onclick=()=>$("#steps").style.display="block";
$("#answer").onkeydown=e=>{if(e.key==="Enter")check();};
</script>

</body>
</html>
